<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konversi Satuan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');

  :root{
    --bg: #f5f3ee;
    --panel: #ffffff;
    --line: #e2ddd2;
    --ink: #1c1d1f;
    --dim: #8a8578;
    --accent: #2f8a5e;
    --accent-soft: color-mix(in srgb, var(--accent) 10%, transparent);
    --accent-border: color-mix(in srgb, var(--accent) 30%, transparent);
    --shadow: rgba(28,29,31,0.10);
  }

  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :focus{ outline:none; }

  html, body{
    min-height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Grotesk', sans-serif;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding: 24px 16px 48px;
    width: 100%;
  }

  .card{
    width: 100%;
    max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 24px 20px 28px;
    box-shadow: 0 24px 60px -20px var(--shadow);
  }

  /* ── Header ── */
  .header{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .header-icon{
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    flex-shrink: 0;
  }

  .header-icon svg{ width: 18px; height: 18px; }

  h1{
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  /* ── Tabs ── */
  .tabs-wrap{
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    margin-bottom: 24px;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar{ display: none; }

  .tab-btn{
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .tab-btn:hover{ border-color: var(--accent); color: var(--ink); }
  .tab-btn.active{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Converter ── */
  .converter{
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .field-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 7px;
  }

  .field select{
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--line);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    background: var(--bg);
    color: var(--ink);
    cursor: pointer;
    transition: border-color 0.15s;
    appearance: auto;
  }
  .field select:focus{ border-color: var(--accent); }

  .field input{
    width: 100%;
    margin-top: 8px;
    padding: 14px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 400;
    background: var(--bg);
    color: var(--ink);
    transition: border-color 0.15s;
  }
  .field input:focus{ border-color: var(--accent); }
  .field input::placeholder{ color: var(--line); }

  /* ── Swap divider ── */
  .swap-row{
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
  }

  .swap-line{
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .swap-btn{
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .swap-btn:hover{ border-color: var(--accent); background: var(--accent-soft); }
  .swap-btn:active{ transform: scale(0.9); }
  .swap-btn svg{ width: 16px; height: 16px; }

  @keyframes swap-spin{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(180deg); }
  }
  .swap-btn.is-spinning{ animation: swap-spin 0.3s ease; }
  @media (prefers-reduced-motion: reduce){ .swap-btn.is-spinning{ animation: none; } }

  /* ── Result ── */
  .result{
    margin-top: 20px;
    padding: 16px;
    border-radius: 14px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    text-align: center;
    color: var(--ink);
    word-break: break-word;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .result.empty{ color: var(--dim); font-size: 12px; }
</style>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </div>
    <h1>Konversi Satuan</h1>
  </div>

  <div class="tabs-wrap" id="tabsWrap"></div>

  <div class="converter">
    <div class="field">
      <div class="field-label">Dari</div>
      <select id="fromUnit"></select>
      <input type="number" id="fromValue" placeholder="0" inputmode="decimal">
    </div>

    <div class="swap-row">
      <div class="swap-line"></div>
      <button class="swap-btn" id="swapBtn" type="button" aria-label="Tukar satuan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
      <div class="swap-line"></div>
    </div>

    <div class="field">
      <div class="field-label">Ke</div>
      <select id="toUnit"></select>
      <input type="number" id="toValue" placeholder="0" inputmode="decimal">
    </div>
  </div>

  <div class="result empty" id="resultLine">Masukkan angka untuk mulai.</div>

</div>

<script>
  const categories = {
    suhu: {
      label: 'Suhu', kind: 'temperature',
      units: [
        { id: 'celsius',    label: 'Celsius (°C)' },
        { id: 'fahrenheit', label: 'Fahrenheit (°F)' },
        { id: 'kelvin',     label: 'Kelvin (K)' },
        { id: 'reaumur',    label: 'Réaumur (°Ré)' }
      ]
    },
    panjang: {
      label: 'Panjang', kind: 'linear',
      units: [
        { id: 'nm',        label: 'Nanometer (nm)',        factor: 1e-9 },
        { id: 'um',        label: 'Mikrometer (µm)',       factor: 1e-6 },
        { id: 'mm',        label: 'Milimeter (mm)',        factor: 0.001 },
        { id: 'cm',        label: 'Sentimeter (cm)',       factor: 0.01 },
        { id: 'm',         label: 'Meter (m)',             factor: 1 },
        { id: 'km',        label: 'Kilometer (km)',        factor: 1000 },
        { id: 'inch',      label: 'Inci (in)',             factor: 0.0254 },
        { id: 'foot',      label: 'Kaki (ft)',             factor: 0.3048 },
        { id: 'yard',      label: 'Yard (yd)',             factor: 0.9144 },
        { id: 'mile',      label: 'Mil (mi)',              factor: 1609.34 },
        { id: 'nmi',       label: 'Mil Laut (nmi)',        factor: 1852 },
        { id: 'lightyear', label: 'Tahun Cahaya (ly)',     factor: 9.4607e15 }
      ]
    },
    massa: {
      label: 'Massa', kind: 'linear',
      units: [
        { id: 'mcg',       label: 'Mikrogram (µg)',        factor: 1e-6 },
        { id: 'mg',        label: 'Miligram (mg)',         factor: 0.001 },
        { id: 'g',         label: 'Gram (g)',              factor: 1 },
        { id: 'dag',       label: 'Dekagram (dag)',        factor: 10 },
        { id: 'hg',        label: 'Hektogram / Ons (hg)', factor: 100 },
        { id: 'kg',        label: 'Kilogram (kg)',         factor: 1000 },
        { id: 'ton',       label: 'Ton Metrik (t)',        factor: 1000000 },
        { id: 'oz',        label: 'Ons (oz)',              factor: 28.3495 },
        { id: 'lb',        label: 'Pon (lb)',              factor: 453.592 },
        { id: 'stone',     label: 'Stone (st)',            factor: 6350.29 },
        { id: 'karat',     label: 'Karat (ct)',            factor: 0.2 }
      ]
    },
    volume: {
      label: 'Volume', kind: 'linear',
      units: [
        { id: 'ml',        label: 'Mililiter (mL)',        factor: 0.001 },
        { id: 'cl',        label: 'Sentiliter (cL)',       factor: 0.01 },
        { id: 'dl',        label: 'Desiliter (dL)',        factor: 0.1 },
        { id: 'l',         label: 'Liter (L)',             factor: 1 },
        { id: 'm3',        label: 'Meter Kubik (m³)',      factor: 1000 },
        { id: 'cm3',       label: 'Sentimeter Kubik (cm³)',factor: 0.001 },
        { id: 'tsp',       label: 'Sendok Teh (tsp)',      factor: 0.00492892 },
        { id: 'tbsp',      label: 'Sendok Makan (tbsp)',   factor: 0.0147868 },
        { id: 'cup',       label: 'Cangkir (cup)',         factor: 0.236588 },
        { id: 'pint',      label: 'Pint (US)',             factor: 0.473176 },
        { id: 'gallon',    label: 'Galon (US)',            factor: 3.78541 },
        { id: 'gallon_uk', label: 'Galon Inggris (UK)',    factor: 4.54609 }
      ]
    },
    luas: {
      label: 'Luas', kind: 'linear',
      units: [
        { id: 'mm2',   label: 'Milimeter² (mm²)',   factor: 0.000001 },
        { id: 'cm2',   label: 'Sentimeter² (cm²)',  factor: 0.0001 },
        { id: 'm2',    label: 'Meter² (m²)',         factor: 1 },
        { id: 'are',   label: 'Are (a)',             factor: 100 },
        { id: 'hektar',label: 'Hektar (ha)',         factor: 10000 },
        { id: 'km2',   label: 'Kilometer² (km²)',    factor: 1000000 },
        { id: 'ft2',   label: 'Kaki² (ft²)',         factor: 0.092903 },
        { id: 'acre',  label: 'Acre',                factor: 4046.86 },
        { id: 'mile2', label: 'Mil² (mi²)',          factor: 2589988.11 }
      ]
    },
    kecepatan: {
      label: 'Kecepatan', kind: 'linear',
      units: [
        { id: 'mps',  label: 'Meter/detik (m/s)',    factor: 1 },
        { id: 'kmh',  label: 'Kilometer/jam (km/h)', factor: 0.277778 },
        { id: 'mph',  label: 'Mil/jam (mph)',         factor: 0.44704 },
        { id: 'knot', label: 'Knot (kn)',             factor: 0.514444 },
        { id: 'fps',  label: 'Kaki/detik (ft/s)',    factor: 0.3048 },
        { id: 'mach', label: 'Mach',                 factor: 343 }
      ]
    },
    data: {
      label: 'Data', kind: 'linear',
      units: [
        { id: 'bit',  label: 'Bit (b)',       factor: 0.125 },
        { id: 'byte', label: 'Byte (B)',      factor: 1 },
        { id: 'kb',   label: 'Kilobyte (KB)', factor: 1024 },
        { id: 'mb',   label: 'Megabyte (MB)', factor: 1048576 },
        { id: 'gb',   label: 'Gigabyte (GB)', factor: 1073741824 },
        { id: 'tb',   label: 'Terabyte (TB)', factor: 1099511627776 }
      ]
    }
  };

  let currentCategory = 'panjang';

  const tabsWrap      = document.getElementById('tabsWrap');
  const fromUnitSel   = document.getElementById('fromUnit');
  const toUnitSel     = document.getElementById('toUnit');
  const fromValueInput= document.getElementById('fromValue');
  const toValueInput  = document.getElementById('toValue');
  const swapBtn       = document.getElementById('swapBtn');
  const resultLine    = document.getElementById('resultLine');

  function renderTabs(){
    tabsWrap.innerHTML = '';
    Object.keys(categories).forEach(key => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tab-btn' + (key === currentCategory ? ' active' : '');
      btn.textContent = categories[key].label;
      btn.addEventListener('click', () => { currentCategory = key; renderTabs(); renderUnitDropdowns(); });
      tabsWrap.appendChild(btn);
    });
    // scroll active tab into view
    const active = tabsWrap.querySelector('.active');
    if (active) active.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
  }

  function renderUnitDropdowns(){
    const cat = categories[currentCategory];
    fromUnitSel.innerHTML = '';
    toUnitSel.innerHTML   = '';
    cat.units.forEach(unit => {
      const o1 = new Option(unit.label, unit.id);
      const o2 = new Option(unit.label, unit.id);
      fromUnitSel.appendChild(o1);
      toUnitSel.appendChild(o2);
    });
    fromUnitSel.selectedIndex = 0;
    toUnitSel.selectedIndex   = cat.units.length > 1 ? 1 : 0;
    fromValueInput.value = '';
    toValueInput.value   = '';
    setResult('', true);
  }

  function celsiusFrom(id, v){
    if (id==='celsius')    return v;
    if (id==='fahrenheit') return (v-32)*5/9;
    if (id==='kelvin')     return v-273.15;
    if (id==='reaumur')    return v*5/4;
  }
  function celsiusTo(id, c){
    if (id==='celsius')    return c;
    if (id==='fahrenheit') return c*9/5+32;
    if (id==='kelvin')     return c+273.15;
    if (id==='reaumur')    return c*4/5;
  }

  function convert(fromId, toId, val){
    const cat = categories[currentCategory];
    if (cat.kind === 'temperature') return celsiusTo(toId, celsiusFrom(fromId, val));
    const f = cat.units.find(u=>u.id===fromId).factor;
    const t = cat.units.find(u=>u.id===toId).factor;
    return val * f / t;
  }

  function fmt(num){
    if (!isFinite(num)) return '';
    const r = Math.round(num * 1e10) / 1e10;
    return parseFloat(r.toFixed(10)).toString();
  }

  function setResult(text, empty){
    resultLine.textContent = text || 'Masukkan angka untuk mulai.';
    resultLine.classList.toggle('empty', !text || empty);
  }

  function recalc(source){
    const srcInput  = source === 'from' ? fromValueInput : toValueInput;
    const dstInput  = source === 'from' ? toValueInput   : fromValueInput;
    const srcSel    = source === 'from' ? fromUnitSel    : toUnitSel;
    const dstSel    = source === 'from' ? toUnitSel      : fromUnitSel;

    if (srcInput.value === ''){ dstInput.value = ''; setResult('', true); return; }
    const val = parseFloat(srcInput.value);
    if (isNaN(val)) return;
    const result = convert(srcSel.value, dstSel.value, val);
    dstInput.value = fmt(result);

    const fLabel = fromUnitSel.options[fromUnitSel.selectedIndex].text;
    const tLabel = toUnitSel.options[toUnitSel.selectedIndex].text;
    setResult(`${fromValueInput.value} ${fLabel} = ${toValueInput.value} ${tLabel}`);
  }

  fromValueInput.addEventListener('input', () => recalc('from'));
  toValueInput.addEventListener('input',   () => recalc('to'));
  fromUnitSel.addEventListener('change',   () => recalc('from'));
  toUnitSel.addEventListener('change',     () => recalc('from'));

  swapBtn.addEventListener('click', () => {
    [fromUnitSel.value, toUnitSel.value] = [toUnitSel.value, fromUnitSel.value];
    [fromValueInput.value, toValueInput.value] = [toValueInput.value, fromValueInput.value];
    recalc('from');
    swapBtn.classList.remove('is-spinning');
    void swapBtn.offsetWidth;
    swapBtn.classList.add('is-spinning');
  });
  swapBtn.addEventListener('animationend', () => swapBtn.classList.remove('is-spinning'));

  renderTabs();
  renderUnitDropdowns();
</script>
</body>
</html>
