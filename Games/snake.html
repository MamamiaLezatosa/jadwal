<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :focus { outline: none; }
    button, div { -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:              #F4F1EA;
      --panel:           #FDFAF4;
      --panel-border:    #DDD8CC;
      --stat-bg:         #EDE9DF;
      --text:            #2C2416;
      --text-muted:      #7A6E5C;
      --text-tip:        #A09484;
      --btn-border:      #C8C2B2;
      --btn-hover:       #EDE9DF;
      --btn-hover-border:#8B7355;
      --accent:          #6B5744;
      --accent-text:     #FDFAF4;
      --board-bg:        #E8E4DA;
      --board-border:    #C4BEB0;
      --modal-overlay:   rgba(44,36,22,0.4);
    }
    body.dark {
      --bg:              #1a1a2e;
      --panel:           #16213e;
      --panel-border:    #2a2a4a;
      --stat-bg:         #0f3460;
      --text:            #e8e8f0;
      --text-muted:      #8888aa;
      --text-tip:        #555577;
      --btn-border:      #3a3a5c;
      --btn-hover:       #2a2a4a;
      --btn-hover-border:#6c6caa;
      --accent:          #4a4aaa;
      --accent-text:     #ffffff;
      --board-bg:        #0d1a2e;
      --board-border:    #1a2a4a;
      --modal-overlay:   rgba(0,0,0,0.6);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1rem 3rem;
      transition: background 0.2s, color 0.2s;
    }

    #top-bar {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 620px; margin-bottom: 1.25rem; gap: 8px;
    }
    h1 { font-size: 1.6rem; font-weight: 700; }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid var(--btn-border); background: var(--panel);
      color: var(--text); display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: border-color 0.2s, background 0.3s, transform 0.15s;
    }
    .icon-btn:hover { border-color: var(--accent); }
    .icon-btn:active { transform: scale(0.92); }
    .icon-btn svg { width: 19px; height: 19px; }
    #theme-toggle .icon-sun { display: none; }
    #theme-toggle .icon-moon { display: block; }
    body.dark #theme-toggle .icon-sun { display: block; }
    body.dark #theme-toggle .icon-moon { display: none; }

    #sn-panel {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 16px; padding: 1.25rem 1.25rem 1rem;
      width: 100%; max-width: 620px;
      transition: background 0.2s, border-color 0.2s;
    }
    #sn-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; gap: 8px; flex-wrap: wrap;
    }
    #sn-info { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .sn-stat {
      background: var(--stat-bg); border-radius: 8px; padding: 5px 12px;
      font-size: 14px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 5px; transition: background 0.2s;
    }
    .hdr-btn {
      font-size: 13px; padding: 5px 13px; border-radius: 8px;
      border: 1.5px solid var(--btn-border); background: transparent;
      color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .hdr-btn:hover { background: var(--btn-hover); border-color: var(--btn-hover-border); }

    #sn-status {
      text-align: center; font-size: 15px; font-weight: 600;
      min-height: 22px; margin-bottom: 10px; color: var(--text);
    }
    #sn-board-wrap {
      overflow: hidden; margin: 0 auto 0.75rem;
      display: flex; justify-content: center;
    }
    canvas { border-radius: 8px; border: 1px solid var(--board-border); display: block; }
    #sn-tip { text-align: center; font-size: 12px; color: var(--text-tip); margin-top: 0.5rem; }

    /* D-pad */
    #dpad {
      display: none;
      grid-template-columns: repeat(3, 72px);
      grid-template-rows: repeat(2, 72px);
      gap: 8px; justify-content: center; margin: 1rem auto 0;
    }
    #dpad button {
      width: 72px; height: 72px; border: 1.5px solid var(--btn-border);
      border-radius: 16px; background: var(--stat-bg); color: var(--text);
      font-size: 26px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; user-select: none; font-family: inherit;
      touch-action: manipulation;
      transition: background 0.1s, border-color 0.1s;
    }
    #dpad button:active { background: var(--btn-hover); border-color: var(--btn-hover-border); transform: scale(0.91); }

    /* Settings modal */
    #settings-modal {
      display: none; position: fixed; inset: 0;
      background: var(--modal-overlay); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    #settings-modal.open { display: flex; }
    #settings-box {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 340px;
    }
    #settings-box h2 { font-size: 16px; font-weight: 700; margin-bottom: 1.25rem; }

    .setting-row {
      margin-bottom: 1.1rem;
    }
    .setting-row label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; color: var(--text-muted); margin-bottom: 6px;
    }
    .setting-row label span { font-weight: 600; color: var(--text); }
    .setting-row input[type=range] {
      width: 100%; accent-color: var(--accent); cursor: pointer;
    }
    .setting-row .color-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent; transition: border-color 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.selected { border-color: var(--text); }
    .color-swatch.custom-swatch {
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; background: var(--stat-bg); border-color: var(--btn-border);
      position: relative; overflow: hidden;
    }
    .color-swatch.custom-swatch input[type=color] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .setting-divider { border: none; border-top: 1px solid var(--btn-border); margin: 1rem 0; }

    .food-type-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px;
    }
    .food-type-btn {
      width: 44px; height: 44px; border-radius: 10px; border: 2px solid transparent;
      background: var(--stat-bg); font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, transform 0.1s;
    }
    .food-type-btn:hover { transform: scale(1.1); }
    .food-type-btn.selected { border-color: var(--text); }

    #settings-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
    #settings-actions button {
      font-size: 13px; padding: 7px 18px; border-radius: 8px;
      border: 1.5px solid var(--btn-border); background: transparent;
      color: var(--text); cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    #settings-actions button:hover { background: var(--btn-hover); }
    #settings-actions button.primary {
      background: var(--accent); border-color: var(--accent); color: var(--accent-text);
    }
    #settings-actions button.primary:hover { opacity: 0.85; }

    /* Leaderboard modal */
    #leaderboard-modal {
      display: none; position: fixed; inset: 0;
      background: var(--modal-overlay); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    #leaderboard-modal.open { display: flex; }
    #leaderboard-box {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 420px;
      max-height: 80vh; overflow-y: auto;
    }
    #leaderboard-box h2 { font-size: 16px; font-weight: 700; }

    .lb-entry {
      background: var(--stat-bg); border-radius: 10px;
      padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.2s;
    }
    .lb-rank {
      font-size: 18px; width: 28px; text-align: center; flex-shrink: 0;
    }
    .lb-info { flex: 1; min-width: 0; }
    .lb-score {
      font-size: 20px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .lb-mode {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .lb-tag {
      background: var(--panel); border: 1px solid var(--btn-border);
      border-radius: 5px; padding: 1px 6px; font-size: 11px; white-space: nowrap;
    }
    .lb-empty {
      text-align: center; color: var(--text-muted); font-size: 14px; padding: 2rem 0;
    }
    #lb-clear-btn:hover { color: var(--text); border-color: var(--btn-hover-border); background: var(--btn-hover); }

    @media (max-width: 600px) {
      h1 { font-size: 1.3rem; }
      #dpad { display: grid; }
    }
  </style>
</head>
<body>

<div id="top-bar">
  <h1>🐍 Snake</h1>
  <div style="display:flex;gap:8px;">
    <button class="icon-btn" id="leaderboard-btn" aria-label="Leaderboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4a2 2 0 0 1-2-2V5h4"/><path d="M18 9h2a2 2 0 0 0 2-2V5h-4"/><path d="M6 2h12v10a6 6 0 0 1-12 0V2z"/><path d="M12 18v4"/><path d="M8 22h8"/>
      </svg>
    </button>
    <button class="icon-btn" id="settings-btn" aria-label="Pengaturan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="icon-btn" id="theme-toggle" aria-label="Ganti tema">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</div>

<div id="sn-panel">
  <div id="sn-header">
    <div id="sn-info">
      <div class="sn-stat">🍎 <span id="score-val">0</span></div>
      <div class="sn-stat">🏆 <span id="best-val">0</span></div>
      <div class="sn-stat">⏱ <span id="timer-val">0</span>s</div>
    </div>
    <button class="hdr-btn" onclick="startGame()">🔄 Ulang</button>
  </div>

  <div id="sn-status">Tekan Ulang untuk mulai bermain</div>
  <div id="sn-board-wrap"><canvas id="sn-canvas"></canvas></div>

  <div id="dpad">
    <div></div>
    <button id="du" aria-label="Atas">▲</button>
    <div></div>
    <button id="dl" aria-label="Kiri">◀</button>
    <button id="dd" aria-label="Bawah">▼</button>
    <button id="dr" aria-label="Kanan">▶</button>
  </div>

  <p id="sn-tip">Gunakan tombol panah atau WASD untuk bergerak</p>
</div>

<!-- Leaderboard Modal -->
<div id="leaderboard-modal">
  <div id="leaderboard-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <h2>🏆 Leaderboard</h2>
      <button class="icon-btn" id="lb-close-btn" style="width:32px;height:32px;" aria-label="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:1rem;">Skor tertinggi per mode (kombinasi pengaturan unik)</p>
    <div id="lb-list"></div>
    <div style="margin-top:1.25rem;text-align:right;">
      <button id="lb-clear-btn" style="font-size:12px;padding:5px 12px;border-radius:8px;border:1.5px solid var(--btn-border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:inherit;">🗑 Hapus Semua</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal">
  <div id="settings-box">
    <h2>⚙️ Pengaturan</h2>

    <div class="setting-row">
      <label>Kecepatan <span id="speed-label">5</span></label>
      <input type="range" id="speed-slider" min="1" max="10" value="5" step="1">
    </div>

    <div class="setting-row">
      <label>Ukuran Grid <span id="grid-label">20×20</span></label>
      <input type="range" id="grid-slider" min="10" max="30" value="20" step="5">
    </div>

    <hr class="setting-divider">

    <div class="setting-row">
      <label>Warna Ular</label>
      <div class="color-row" id="snake-colors"></div>
    </div>

    <hr class="setting-divider">

    <div class="setting-row">
      <label>Jumlah Makanan <span id="food-count-label">1</span></label>
      <input type="range" id="food-count-slider" min="1" max="10" value="1" step="1">
    </div>

    <div class="setting-row">
      <label>Jenis Makanan</label>
      <div class="food-type-row" id="food-type-row"></div>
    </div>

    <div id="settings-actions">
      <button onclick="closeSettings()">Batal</button>
      <button class="primary" onclick="applySettings()">Terapkan</button>
    </div>
  </div>
</div>

<script>
  // ── Theme ────────────────────────────────────────────
  let dark = localStorage.getItem('snake_dark') === '1';
  document.body.classList.toggle('dark', dark);
  document.getElementById('theme-toggle').addEventListener('click', () => {
    dark = !dark;
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('snake_dark', dark ? '1' : '0');
  });

  // ── Settings state ───────────────────────────────────
  const SNAKE_PALETTES = [
    { label: 'Hijau',   h: '#3aaa6a', b: '#2a7a4a' },
    { label: 'Biru',    h: '#3a7acc', b: '#2a5a9a' },
    { label: 'Ungu',    h: '#8a4acc', b: '#5a2a9a' },
    { label: 'Oranye',  h: '#cc7a2a', b: '#9a5a1a' },
    { label: 'Merah',   h: '#cc3a3a', b: '#9a2222' },
    { label: 'Pink',    h: '#cc3a88', b: '#9a2266' },
  ];

  const DEFAULT_CFG = {
    speedLevel: 5,
    cols: 20, rows: 20,
    paletteIdx: 0,
    customColor: null,
    foodCount: 1,
    foodType: 'apple',
  };
  let cfg = { ...DEFAULT_CFG };
  try {
    const saved = JSON.parse(localStorage.getItem('snake_cfg'));
    if (saved) cfg = { ...DEFAULT_CFG, ...saved };
  } catch(e) {}
  let pendingCfg = { ...cfg };

  // Build color swatches
  const colorRow = document.getElementById('snake-colors');
  SNAKE_PALETTES.forEach((p, i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i === 0 ? ' selected' : '');
    sw.style.background = p.h;
    sw.title = p.label;
    sw.addEventListener('click', () => {
      pendingCfg.paletteIdx = i;
      pendingCfg.customColor = null;
      colorRow.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
    });
    colorRow.appendChild(sw);
  });
  // Custom color picker swatch
  const customSw = document.createElement('div');
  customSw.className = 'color-swatch custom-swatch';
  customSw.title = 'Kustom';
  customSw.innerHTML = '🎨<input type="color" id="custom-color-input" value="#22aa66">';
  colorRow.appendChild(customSw);
  document.getElementById('custom-color-input').addEventListener('input', e => {
    pendingCfg.customColor = e.target.value;
    pendingCfg.paletteIdx = -1;
    colorRow.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    customSw.classList.add('selected');
  });

  // Slider labels
  const speedSlider = document.getElementById('speed-slider');
  const gridSlider  = document.getElementById('grid-slider');
  const foodCountSlider = document.getElementById('food-count-slider');

  // Food type picker
  const FOOD_TYPES = [
    { id: 'apple',      emoji: '🍎', label: 'Apel' },
    { id: 'orange',     emoji: '🍊', label: 'Jeruk' },
    { id: 'grape',      emoji: '🍇', label: 'Anggur' },
    { id: 'watermelon', emoji: '🍉', label: 'Semangka' },
    { id: 'rat',        emoji: '🐀', label: 'Tikus' },
  ];
  const foodTypeRow = document.getElementById('food-type-row');
  FOOD_TYPES.forEach(ft => {
    const btn = document.createElement('button');
    btn.className = 'food-type-btn' + (ft.id === 'apple' ? ' selected' : '');
    btn.textContent = ft.emoji;
    btn.title = ft.label;
    btn.addEventListener('click', () => {
      pendingCfg.foodType = ft.id;
      foodTypeRow.querySelectorAll('.food-type-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    foodTypeRow.appendChild(btn);
  });

  foodCountSlider.addEventListener('input', () => {
    document.getElementById('food-count-label').textContent = foodCountSlider.value;
    pendingCfg.foodCount = +foodCountSlider.value;
  });
  speedSlider.addEventListener('input', () => {
    document.getElementById('speed-label').textContent = speedSlider.value;
    pendingCfg.speedLevel = +speedSlider.value;
  });
  gridSlider.addEventListener('input', () => {
    const v = +gridSlider.value;
    document.getElementById('grid-label').textContent = v + '×' + v;
    pendingCfg.cols = v; pendingCfg.rows = v;
  });

  document.getElementById('settings-btn').addEventListener('click', () => {
    pendingCfg = { ...cfg };
    speedSlider.value = cfg.speedLevel;
    document.getElementById('speed-label').textContent = cfg.speedLevel;
    gridSlider.value = cfg.cols;
    document.getElementById('grid-label').textContent = cfg.cols + '×' + cfg.cols;
    colorRow.querySelectorAll('.color-swatch').forEach((s, i) => {
      s.classList.toggle('selected', i === cfg.paletteIdx || (i === SNAKE_PALETTES.length && cfg.customColor));
    });
    foodCountSlider.value = cfg.foodCount;
    document.getElementById('food-count-label').textContent = cfg.foodCount;
    foodTypeRow.querySelectorAll('.food-type-btn').forEach((b, i) => {
      b.classList.toggle('selected', FOOD_TYPES[i].id === cfg.foodType);
    });
    document.getElementById('settings-modal').classList.add('open');
  });

  function closeSettings() {
    document.getElementById('settings-modal').classList.remove('open');
  }
  function applySettings() {
    cfg = { ...pendingCfg };
    localStorage.setItem('snake_cfg', JSON.stringify(cfg));
    closeSettings();
    resizeCanvas();
    refreshBestDisplay();
    startGame();
  }
  document.getElementById('settings-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('settings-modal')) closeSettings();
  });

  // ── Leaderboard ──────────────────────────────────────
  const FOOD_EMOJI = { apple:'🍎', orange:'🍊', grape:'🍇', watermelon:'🍉', rat:'🐀' };
  const RANK_ICONS = ['🥇','🥈','🥉'];

  function modeKey(c) {
    return `sp${c.speedLevel}_g${c.cols}_fc${c.foodCount}_ft${c.foodType}`;
  }

  function loadLeaderboard() {
    try { return JSON.parse(localStorage.getItem('snake_lb')) || {}; } catch(e) { return {}; }
  }

  function saveLeaderboard(lb) {
    localStorage.setItem('snake_lb', JSON.stringify(lb));
  }

  function updateLeaderboard(finalScore) {
    const lb = loadLeaderboard();
    const key = modeKey(cfg);
    const existing = lb[key];
    if (!existing || finalScore > existing.score) {
      lb[key] = {
        score: finalScore,
        speedLevel: cfg.speedLevel,
        cols: cfg.cols,
        foodCount: cfg.foodCount,
        foodType: cfg.foodType,
        ts: Date.now()
      };
      saveLeaderboard(lb);
    }
  }

  function renderLeaderboard() {
    const lb = loadLeaderboard();
    const entries = Object.values(lb).sort((a, b) => b.score - a.score);
    const list = document.getElementById('lb-list');
    if (entries.length === 0) {
      list.innerHTML = '<div class="lb-empty">Belum ada skor.<br>Main dulu, yuk! 🐍</div>';
      return;
    }
    list.innerHTML = entries.map((e, i) => `
      <div class="lb-entry">
        <div class="lb-rank">${RANK_ICONS[i] || (i + 1)}</div>
        <div class="lb-info">
          <div style="font-size:13px;font-weight:600;color:var(--text);">
            ${FOOD_EMOJI[e.foodType] || '🍎'} Mode
          </div>
          <div class="lb-mode">
            <span class="lb-tag">⚡ Speed ${e.speedLevel}</span>
            <span class="lb-tag">⊞ Grid ${e.cols}×${e.cols}</span>
            <span class="lb-tag">${FOOD_EMOJI[e.foodType] || '🍎'} ×${e.foodCount}</span>
          </div>
        </div>
        <div class="lb-score">${e.score}</div>
      </div>
    `).join('');
  }

  function openLeaderboard() {
    renderLeaderboard();
    document.getElementById('leaderboard-modal').classList.add('open');
  }
  function closeLeaderboard() {
    document.getElementById('leaderboard-modal').classList.remove('open');
  }

  document.getElementById('leaderboard-btn').addEventListener('click', openLeaderboard);
  document.getElementById('lb-close-btn').addEventListener('click', closeLeaderboard);
  document.getElementById('leaderboard-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('leaderboard-modal')) closeLeaderboard();
  });
  document.getElementById('lb-clear-btn').addEventListener('click', () => {
    if (confirm('Hapus semua data leaderboard?')) {
      localStorage.removeItem('snake_lb');
      renderLeaderboard();
    }
  });

  function getSnakeColors() {
    if (cfg.customColor) {
      const h = cfg.customColor;
      // Darken for body
      const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
      const body = `rgb(${Math.round(r*0.65)},${Math.round(g*0.65)},${Math.round(b*0.65)})`;
      return { head: h, body };
    }
    const p = SNAKE_PALETTES[Math.max(0, cfg.paletteIdx)];
    return { head: p.h, body: p.b };

  }

  function speedToMs(level) {
    // level 1=slowest(300ms), 10=fastest(50ms)
    return Math.round(300 - (level - 1) * (250 / 9));
  }

  // ── Canvas / grid ────────────────────────────────────
  const canvas = document.getElementById('sn-canvas');
  const ctx = canvas.getContext('2d');
  const GAP = 2;
  let COLS, ROWS, CELL, BOARD_W, BOARD_H;

  function calcCell() {
    const panel = document.getElementById('sn-panel');
    const available = panel.clientWidth - 40;
    return Math.max(8, Math.floor((available - (cfg.cols + 1) * GAP) / cfg.cols));
  }

  function resizeCanvas() {
    COLS = cfg.cols; ROWS = cfg.rows;
    CELL = calcCell();
    BOARD_W = COLS * CELL + (COLS + 1) * GAP;
    BOARD_H = ROWS * CELL + (ROWS + 1) * GAP;
    canvas.width = BOARD_W;
    canvas.height = BOARD_H;
  }

  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); drawFrame(0); });
  window.addEventListener('load',   () => { resizeCanvas(); drawFrame(0); });

  // ── State ────────────────────────────────────────────
  let snake, dir, dirQueue, foods;
  let score = 0;
  function getBest() {
    const lb = loadLeaderboard();
    return (lb[modeKey(cfg)] || {}).score || 0;
  }
  function refreshBestDisplay() {
    document.getElementById('best-val').textContent = getBest();
  }
  let running = false, gameOver = false, waiting = false;
  let timerInterval, seconds = 0;

  // Smooth movement
  let lastStepTime = 0;
  let rafId = null;

  function rand(n) { return Math.floor(Math.random() * n); }

  function placeFood(existingFoods) {
    let pos;
    do { pos = { x: rand(COLS), y: rand(ROWS) }; }
    while (
      snake.some(s => s.x === pos.x && s.y === pos.y) ||
      (existingFoods || []).some(f => f.x === pos.x && f.y === pos.y)
    );
    return pos;
  }

  function placeFoods() {
    const arr = [];
    for (let i = 0; i < cfg.foodCount; i++) arr.push(placeFood(arr));
    return arr;
  }

  // ── Drawing helpers ──────────────────────────────────
  function cellXY(cx, cy) {
    return { x: GAP + cx * (CELL + GAP), y: GAP + cy * (CELL + GAP) };
  }

  function drawFood(cx, cy) {
    const type = cfg.foodType;
    if (type === 'apple')      drawApple(cx, cy);
    else if (type === 'orange')     drawOrange(cx, cy);
    else if (type === 'grape')      drawGrape(cx, cy);
    else if (type === 'watermelon') drawWatermelon(cx, cy);
    else if (type === 'rat')        drawRat(cx, cy);
  }

  function drawApple(cx, cy) {
    const { x, y } = cellXY(cx, cy);
    const cx2 = x + CELL / 2, cy2 = y + CELL / 2;
    const r = CELL * 0.36;
    const grad = ctx.createRadialGradient(cx2 - r * 0.3, cy2 - r * 0.3, r * 0.1, cx2, cy2, r);
    grad.addColorStop(0, dark ? '#ff6b6b' : '#ff4444');
    grad.addColorStop(0.6, dark ? '#cc2222' : '#cc1111');
    grad.addColorStop(1, dark ? '#881111' : '#880000');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx2 - r * 0.12, cy2 + r * 0.05, r * 0.88, r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx2 + r * 0.12, cy2 + r * 0.05, r * 0.88, r, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = dark ? '#5a3a1a' : '#3a2010';
    ctx.lineWidth = Math.max(1.5, CELL * 0.07);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx2, cy2 - r * 0.9);
    ctx.quadraticCurveTo(cx2 + r * 0.5, cy2 - r * 1.5, cx2 + r * 0.3, cy2 - r * 1.7);
    ctx.stroke();
    ctx.fillStyle = dark ? '#2a8a3a' : '#1a7a2a';
    ctx.beginPath();
    ctx.ellipse(cx2 + r * 0.35, cy2 - r * 1.35, r * 0.32, r * 0.16, -0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(cx2 - r * 0.28, cy2 - r * 0.32, r * 0.22, r * 0.13, -0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawOrange(cx, cy) {
    const { x, y } = cellXY(cx, cy);
    const cx2 = x + CELL / 2, cy2 = y + CELL / 2 + CELL * 0.04;
    const r = CELL * 0.37;
    const grad = ctx.createRadialGradient(cx2 - r * 0.3, cy2 - r * 0.3, r * 0.05, cx2, cy2, r);
    grad.addColorStop(0, '#ffcc44');
    grad.addColorStop(0.5, '#ff8800');
    grad.addColorStop(1, '#cc5500');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI * 2); ctx.fill();
    // Peel texture lines
    ctx.strokeStyle = 'rgba(180,80,0,0.25)';
    ctx.lineWidth = Math.max(1, CELL * 0.04);
    for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
      ctx.beginPath();
      ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2 + Math.cos(a) * r * 0.9, cy2 + Math.sin(a) * r * 0.9);
      ctx.stroke();
    }
    // Stem
    ctx.strokeStyle = '#3a5a10'; ctx.lineWidth = Math.max(1.5, CELL * 0.07); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx2, cy2 - r); ctx.lineTo(cx2, cy2 - r * 1.5); ctx.stroke();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.ellipse(cx2 - r * 0.25, cy2 - r * 0.3, r * 0.2, r * 0.12, -0.5, 0, Math.PI * 2); ctx.fill();
  }

  function drawGrape(cx, cy) {
    const { x, y } = cellXY(cx, cy);
    const cx2 = x + CELL / 2, cy2 = y + CELL / 2;
    const gr = CELL * 0.14;
    const positions = [
      {dx: -gr*1.1, dy: -gr*1.4}, {dx: gr*1.1, dy: -gr*1.4},
      {dx: -gr*1.6, dy: gr*0.1},  {dx: 0, dy: gr*0.0},       {dx: gr*1.6, dy: gr*0.1},
      {dx: -gr*0.8, dy: gr*1.5},  {dx: gr*0.8, dy: gr*1.5},
    ];
    positions.forEach(({dx, dy}) => {
      const gx = cx2 + dx, gy = cy2 + dy;
      const grad = ctx.createRadialGradient(gx - gr*0.3, gy - gr*0.3, gr*0.05, gx, gy, gr);
      grad.addColorStop(0, '#cc88ff'); grad.addColorStop(0.6, '#8833cc'); grad.addColorStop(1, '#551188');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(gx, gy, gr, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(gx - gr*0.25, gy - gr*0.25, gr*0.3, 0, Math.PI*2); ctx.fill();
    });
    // Stem
    ctx.strokeStyle = '#3a5a10'; ctx.lineWidth = Math.max(1, CELL*0.05); ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx2, cy2 - gr*1.4 - gr); ctx.lineTo(cx2, cy2 - gr*1.4 - gr*2.2); ctx.stroke();
  }

  function drawWatermelon(cx, cy) {
    const { x, y } = cellXY(cx, cy);
    const cx2 = x + CELL / 2, cy2 = y + CELL / 2 + CELL*0.05;
    const r = CELL * 0.38;
    // Red flesh (half circle)
    const grad = ctx.createRadialGradient(cx2, cy2, r*0.1, cx2, cy2, r);
    grad.addColorStop(0, '#ff6688'); grad.addColorStop(0.7, '#ee2244'); grad.addColorStop(1, '#cc1133');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx2, cy2, r, Math.PI, 0); ctx.closePath(); ctx.fill();
    // Green rind
    ctx.fillStyle = '#33aa33';
    ctx.beginPath(); ctx.arc(cx2, cy2, r, 0, Math.PI); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#55cc44';
    ctx.beginPath(); ctx.arc(cx2, cy2, r*0.82, 0, Math.PI); ctx.closePath(); ctx.fill();
    // Seeds
    ctx.fillStyle = '#111';
    [[-r*0.35, -r*0.3], [0, -r*0.45], [r*0.35, -r*0.3], [-r*0.18, -r*0.1], [r*0.18, -r*0.1]].forEach(([sdx, sdy]) => {
      ctx.beginPath(); ctx.ellipse(cx2+sdx, cy2+sdy, r*0.045, r*0.08, 0.3, 0, Math.PI*2); ctx.fill();
    });
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath(); ctx.ellipse(cx2 - r*0.25, cy2 - r*0.35, r*0.18, r*0.1, -0.4, 0, Math.PI*2); ctx.fill();
  }

  function drawRat(cx, cy) {
    const { x, y } = cellXY(cx, cy);
    const cx2 = x + CELL / 2, cy2 = y + CELL / 2;
    const s = CELL * 0.38;
    const bodyColor = dark ? '#aaaaaa' : '#888888';
    const darkColor = dark ? '#777777' : '#555555';
    // Body
    const grad = ctx.createRadialGradient(cx2 - s*0.1, cy2, s*0.1, cx2, cy2, s);
    grad.addColorStop(0, dark ? '#cccccc' : '#aaaaaa');
    grad.addColorStop(1, darkColor);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.ellipse(cx2, cy2 + s*0.1, s*0.72, s*0.55, 0, 0, Math.PI*2); ctx.fill();
    // Head
    ctx.fillStyle = bodyColor;
    ctx.beginPath(); ctx.ellipse(cx2 + s*0.55, cy2 - s*0.08, s*0.38, s*0.3, 0.3, 0, Math.PI*2); ctx.fill();
    // Ears
    ctx.fillStyle = '#ffaaaa';
    ctx.beginPath(); ctx.ellipse(cx2 + s*0.38, cy2 - s*0.42, s*0.16, s*0.2, -0.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2 + s*0.65, cy2 - s*0.38, s*0.14, s*0.18, 0.3, 0, Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle = '#cc2222';
    ctx.beginPath(); ctx.arc(cx2 + s*0.72, cy2 - s*0.1, s*0.07, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(cx2 + s*0.74, cy2 - s*0.12, s*0.03, 0, Math.PI*2); ctx.fill();
    // Nose
    ctx.fillStyle = '#ffaaaa';
    ctx.beginPath(); ctx.arc(cx2 + s*0.92, cy2 - s*0.05, s*0.06, 0, Math.PI*2); ctx.fill();
    // Tail
    ctx.strokeStyle = darkColor; ctx.lineWidth = Math.max(1.5, CELL*0.06); ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx2 - s*0.65, cy2 + s*0.15);
    ctx.quadraticCurveTo(cx2 - s*1.0, cy2 + s*0.5, cx2 - s*0.8, cy2 + s*0.85);
    ctx.stroke();
  }

  function lerpXY(a, b, t) {
    return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
  }

  function drawSnakeSmooth(t) {
    // t = 0..1 interpolation between last step and next
    const colors = getSnakeColors();
    const total = snake.length;

    for (let i = total - 1; i >= 0; i--) {
      const seg = snake[i];
      let px, py;

      if (i === 0) {
        // Head interpolates toward its current position from previous
        const prev = snake[1] || seg;
        const fromX = prev.x, fromY = prev.y;
        px = GAP + (fromX + (seg.x - fromX) * t) * (CELL + GAP);
        py = GAP + (fromY + (seg.y - fromY) * t) * (CELL + GAP);
      } else {
        // Body segment stays put but slightly follows head
        px = GAP + seg.x * (CELL + GAP);
        py = GAP + seg.y * (CELL + GAP);
      }

      const isHead = i === 0;
      const isTail = i === total - 1;
      const pad = isHead ? 0 : isTail ? 2 : 1;
      const sx = px + pad, sy = py + pad;
      const sw = CELL - pad * 2, sh = CELL - pad * 2;
      const r = isHead ? Math.min(sw / 2, CELL * 0.42) : isTail ? Math.min(sw / 2, CELL * 0.38) : CELL * 0.28;

      // Gradient based on palette
      const frac = i / total;
      const grad = ctx.createLinearGradient(sx, sy, sx + sw, sy + sh);
      if (isHead) {
        grad.addColorStop(0, lightenHex(colors.head, 0.18));
        grad.addColorStop(1, colors.head);
      } else {
        const lightness = 1 - frac * 0.25;
        grad.addColorStop(0, blendHex(colors.head, colors.body, frac * 0.6, lightness + 0.08));
        grad.addColorStop(1, blendHex(colors.head, colors.body, frac * 0.6, lightness));
      }

      ctx.fillStyle = grad;
      ctx.strokeStyle = dark ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(sx, sy, sw, sh, r);
      ctx.fill();
      ctx.stroke();

      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.16)';
      ctx.beginPath();
      ctx.roundRect(sx + sw * 0.14, sy + sh * 0.1, sw * 0.48, sh * 0.22, r * 0.5);
      ctx.fill();

      // Eyes on head
      if (isHead) {
        const eyeR = Math.max(1.5, CELL * 0.1);
        const eyeOff = CELL * 0.22;
        const hx = px + CELL / 2, hy = py + CELL / 2;
        let e1x, e1y, e2x, e2y;
        if (dir.x === 1)       { e1x = hx + eyeOff; e1y = hy - eyeOff * 0.7; e2x = hx + eyeOff; e2y = hy + eyeOff * 0.7; }
        else if (dir.x === -1) { e1x = hx - eyeOff; e1y = hy - eyeOff * 0.7; e2x = hx - eyeOff; e2y = hy + eyeOff * 0.7; }
        else if (dir.y === -1) { e1x = hx - eyeOff * 0.7; e1y = hy - eyeOff; e2x = hx + eyeOff * 0.7; e2y = hy - eyeOff; }
        else                   { e1x = hx - eyeOff * 0.7; e1y = hy + eyeOff; e2x = hx + eyeOff * 0.7; e2y = hy + eyeOff; }
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(e1x, e1y, eyeR * 1.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, eyeR * 1.4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#1a1a1a';
        ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.beginPath(); ctx.arc(e1x + eyeR * 0.3, e1y - eyeR * 0.3, eyeR * 0.4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x + eyeR * 0.3, e2y - eyeR * 0.3, eyeR * 0.4, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  // Color helpers
  function hexToRgb(hex) {
    const h = hex.replace('#','');
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }
  function lightenHex(hex, amt) {
    const [r,g,b] = hexToRgb(hex);
    return `rgb(${Math.min(255,Math.round(r+(255-r)*amt))},${Math.min(255,Math.round(g+(255-g)*amt))},${Math.min(255,Math.round(b+(255-b)*amt))})`;
  }
  function blendHex(h1, h2, frac, lighten) {
    const [r1,g1,b1] = hexToRgb(h1);
    const [r2,g2,b2] = hexToRgb(h2);
    let r = r1 + (r2-r1)*frac, g = g1 + (g2-g1)*frac, b = b1 + (b2-b1)*frac;
    if (lighten > 1) { r += (255-r)*(lighten-1); g += (255-g)*(lighten-1); b += (255-b)*(lighten-1); }
    return `rgb(${Math.min(255,Math.round(r))},${Math.min(255,Math.round(g))},${Math.min(255,Math.round(b))})`;
  }

  function drawFrame(now) {
    const stepMs = speedToMs(cfg.speedLevel);
    const elapsed = now - lastStepTime;
    const t = running ? Math.min(elapsed / stepMs, 1) : 0;

    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board-bg').trim();
    ctx.fillRect(0, 0, BOARD_W, BOARD_H);

    // Grid dots
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board-border').trim();
    for (let cx = 0; cx <= COLS; cx++)
      for (let cy = 0; cy <= ROWS; cy++)
        ctx.fillRect(cx * (CELL + GAP), cy * (CELL + GAP), GAP, GAP);

    if (!snake) return;

    foods.forEach(f => drawFood(f.x, f.y));
    drawSnakeSmooth(t);

    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.48)';
      ctx.fillRect(0, 0, BOARD_W, BOARD_H);
      ctx.fillStyle = '#fff';
      ctx.font = `700 ${Math.max(14, CELL)}px -apple-system, sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('Game Over!', BOARD_W / 2, BOARD_H / 2 - CELL * 0.6);
      ctx.font = `${Math.max(11, CELL * 0.7)}px -apple-system, sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('Skor: ' + score, BOARD_W / 2, BOARD_H / 2 + CELL * 0.6);
    }

    if (running || waiting) rafId = requestAnimationFrame(drawFrame);
  }

  // ── Game logic ───────────────────────────────────────
  function step(now) {
    lastStepTime = now;
    if (dirQueue.length > 0) dir = dirQueue.shift();
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
        snake.some(s => s.x === head.x && s.y === head.y)) {
      running = false; gameOver = true;
      cancelAnimationFrame(rafId);
      clearInterval(timerInterval);
      drawFrame(now);
      document.getElementById('sn-status').textContent = '💥 Game over! Skor kamu: ' + score;
      return;
    }

    snake.unshift(head);
    const eatenIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
    if (eatenIdx !== -1) {
      score++;
      document.getElementById('score-val').textContent = score;
      if (score > getBest()) { updateLeaderboard(score); refreshBestDisplay(); }
      foods[eatenIdx] = placeFood(foods.filter((_, i) => i !== eatenIdx));
    } else {
      snake.pop();
    }
  }

  function startGame() {
    cancelAnimationFrame(rafId);
    clearInterval(timerInterval);
    resizeCanvas();
    const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
    snake = [{ x: mx, y: my }, { x: mx - 1, y: my }, { x: mx - 2, y: my }];
    dir = { x: 1, y: 0 }; dirQueue = [];
    score = 0; gameOver = false; running = false; waiting = true; seconds = 0;
    lastStepTime = performance.now();
    document.getElementById('score-val').textContent = 0;
    document.getElementById('timer-val').textContent = 0;
    document.getElementById('sn-status').textContent = 'Tekan arah untuk mulai';
    foods = placeFoods();

    rafId = requestAnimationFrame(drawFrame);
  }

  function beginMoving() {
    if (!waiting) return;
    waiting = false; running = true;
    lastStepTime = performance.now();

    const stepMs = speedToMs(cfg.speedLevel);
    let logicInterval = setInterval(() => {
      if (!running) { clearInterval(logicInterval); return; }
      step(performance.now());
    }, stepMs);
    startGame._interval = logicInterval;

    timerInterval = setInterval(() => {
      seconds++;
      document.getElementById('timer-val').textContent = seconds;
    }, 1000);
  }
  // Clear old interval on restart
  const _origStart = startGame;

  // ── Controls ─────────────────────────────────────────
  const KEY_MAP = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
    W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
  };
  function queueDir(d) {
    const last = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
    if (d.x === -last.x && d.y === -last.y) return; // no 180°
    if (d.x === last.x && d.y === last.y) return;   // no duplicate
    if (dirQueue.length < 2) dirQueue.push(d);
  }
  document.addEventListener('keydown', e => {
    const d = KEY_MAP[e.key];
    if (d) {
      e.preventDefault();
      if (gameOver) { startGame(); return; }
      if (waiting) { queueDir(d); beginMoving(); return; }
      if (running) queueDir(d);
    }
  });
  function dpadDir(d) {
    if (gameOver) { startGame(); return; }
    if (waiting) { queueDir(d); beginMoving(); return; }
    if (running) queueDir(d);
  }
  function bindDpad(id, d) {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', e => { e.preventDefault(); dpadDir(d); }, { passive: false });
    btn.addEventListener('click', () => dpadDir(d));
  }
  bindDpad('du', {x:0,y:-1});
  bindDpad('dd', {x:0,y:1});
  bindDpad('dl', {x:-1,y:0});
  bindDpad('dr', {x:1,y:0});

  if ('ontouchstart' in window) document.getElementById('dpad').style.display = 'grid';

  refreshBestDisplay();
  startGame();
  drawFrame(0);
</script>
</body>
</html>
