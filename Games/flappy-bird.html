<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Flappy Bird V2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
html,body{margin:0;height:100%;overflow:hidden;background:#000}
body{font-family:"Press Start 2P",cursive}
#game{display:block;width:100vw;height:100vh;image-rendering:pixelated}
#pause{
position:fixed;
top:max(12px,env(safe-area-inset-top));
right:12px;
width:56px;
height:56px;
padding:0;
border:none;
background:none;
z-index:1000;
}
#pause img{
width:100%;
height:100%;
image-rendering:pixelated;
}
</style>
</head>
<body>
<button id="pause"><img src="../Assets/Flappy Bird/sprites/pause.png" alt="Pause"></button>
<canvas id="game" width="288" height="512"></canvas>
<script>
const BASE_W=288,BASE_H=512;
const c=document.getElementById('game'),ctx=c.getContext('2d');
function resize(){
 const topOffset = 90;
 const availableWidth = window.innerWidth;
 const availableHeight = window.innerHeight - topOffset;

 c.style.position='absolute';
 c.style.left='0px';
 c.style.top=topOffset+'px';
 c.style.width=availableWidth+'px';
 c.style.height=availableHeight+'px';

 document.body.style.background='#70c5ce';
}
addEventListener('resize',resize);resize();

let paused=false;
document.getElementById('pause').onclick=()=>{
 paused=!paused;
 document.getElementById('pause').textContent=paused?'▶':'⏸';
};

ctx.fillStyle="#fff";
ctx.textAlign="center";

function draw(){
 ctx.clearRect(0,0,BASE_W,BASE_H);
 ctx.fillStyle="#70c5ce";
 ctx.fillRect(0,0,BASE_W,BASE_H);

 ctx.fillStyle="#fff";
 ctx.font='16px "Press Start 2P"';
 ctx.fillText('FLAPPY BIRD V2',BASE_W/2,120);

 ctx.font='10px "Press Start 2P"';
 ctx.fillText('Drop in your asset version here',BASE_W/2,180);

 if(paused){
   ctx.fillStyle='rgba(0,0,0,.5)';
   ctx.fillRect(0,0,BASE_W,BASE_H);
   ctx.fillStyle='#fff';
   ctx.font='18px "Press Start 2P"';
   ctx.fillText('PAUSED',BASE_W/2,256);
 }
 requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
